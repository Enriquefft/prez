name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishers (OIDC) require npm >= 11.5.1; node-20 ships
      # an older npm. No NPM_TOKEN — npm exchanges the GitHub OIDC token
      # for a short-lived publish credential automatically.
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: npm publish --provenance
