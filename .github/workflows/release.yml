name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - run: bun run build

      # Write a minimal .npmrc with just the registry so npm knows
      # where to negotiate the OIDC exchange; no auth lines.
      - run: echo "registry=https://registry.npmjs.org/" > .npmrc

      # Use npx to invoke npm@latest directly. Node 22.22.2's bundled
      # npm is broken (MODULE_NOT_FOUND on its own promise-retry dep)
      # so we cannot rely on `npm install -g npm@latest` to upgrade.
      # npx fetches a fresh npm tarball and runs publish from it; that
      # binary has no missing modules and supports OIDC trusted
      # publishers (>= 11.5.1).
      - run: npx -y npm@latest publish --provenance --access public
